<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiTemp Dashboard Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #007aff; --bg: #0b0e14; --card: #1c1f26; --text: #ffffff; --subtext: #94a3b8; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .app { max-width: 500px; margin: auto; padding: 20px; }
        header { padding: 40px 0 20px; text-align: left; }
        h1 { font-size: 28px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
        .status { color: #34c759; font-size: 14px; display: flex; align-items: center; gap: 6px; }
        .status::before { content: ''; width: 8px; height: 8px; background: #34c759; border-radius: 50%; display: inline-block; box-shadow: 0 0 8px #34c759; }
        
        .main-card { background: var(--card); border-radius: 28px; padding: 30px; margin-top: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); text-align: center; }
        .main-card h2 { font-size: 14px; color: var(--subtext); text-transform: uppercase; letter-spacing: 1px; margin: 0; }
        .temp-value { font-size: 64px; font-weight: 800; margin: 10px 0; background: linear-gradient(to bottom, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .nav-tabs { display: flex; background: #2c2f36; padding: 4px; border-radius: 14px; margin: 25px 0; }
        .nav-tabs button { flex: 1; border: none; background: transparent; color: var(--subtext); padding: 10px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .nav-tabs button.active { background: #3a3f47; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        .chart-box { background: var(--card); border-radius: 28px; padding: 20px; height: 260px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .footer { margin-top: 40px; font-size: 12px; color: var(--subtext); opacity: 0.6; text-align: center; }
    </style>
</head>
<body>
<div class="app">
    <header>
        <div class="status">En línia</div>
        <h1>Monitor de dades</h1>
    </header>

    <div class="main-card">
        <h2 id="period-label">Mitjana Mensual</h2>
        <div class="temp-value" id="main-temp">--°C</div>
        <p style="color: var(--subtext); font-size: 13px;" id="reading-count">Carregant dades...</p>
    </div>

    <div class="nav-tabs">
        <button id="dia" onclick="updateView('diaria')">Diària</button>
        <button id="set" onclick="updateView('setmanal')">Setmanal</button>
        <button id="mes" class="active" onclick="updateView('mensual')">Mensual</button>
    </div>

    <div class="chart-box">
        <canvas id="chart"></canvas>
    </div>

    <div class="footer">SMX2 M12 - Projecte B20 Waterproof Sensor</div>
</div>

<script>
    let allData = [];
    let chart;

    async function start() {
        const res = await fetch('dades_temperatura.csv');
        const csv = await res.text();
        const rows = csv.trim().split('\n').slice(1);
        allData = rows.map(r => ({ t: r.split(','), val: parseFloat(r.split(',')[1]) }));
        
        const ctx = document.getElementById('chart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ data: [], borderColor: '#007aff', borderWidth: 3, tension: 0.4, fill: true, backgroundColor: 'rgba(0, 122, 255, 0.1)', pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: '#2c2f36' }, ticks: { color: '#94a3b8' } } } }
        });
        updateView('mensual');
    }

    function updateView(mode) {
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        document.getElementById(mode.substring(0,3)).classList.add('active');
        
        let filtered = mode === 'diaria' ? allData.slice(-24) : mode === 'setmanal' ? allData.slice(-168) : allData;
        let avg = (filtered.reduce((a, b) => a + b.val, 0) / filtered.length).toFixed(1);
        
        document.getElementById('main-temp').innerText = avg + "°C";
        document.getElementById('period-label').innerText = "Mitjana " + mode;
        document.getElementById('reading-count').innerText = filtered.length + " mostres processades";

        chart.data.labels = filtered.map(d => d.t[0]);
        chart.data.datasets[0].data = filtered.map(d => d.val);
        chart.update();
    }
    start();
</script>
</body>
</html>

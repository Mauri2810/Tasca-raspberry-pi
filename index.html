<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiTemp Premium App</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #4361ee;
            --accent: #4cc9f0;
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #2b2d42;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; padding: 0; 
        }

        header {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            box-shadow: 0 10px 20px rgba(67, 97, 238, 0.2);
        }

        .container { max-width: 600px; margin: -30px auto 40px; padding: 0 20px; }

        /* Card de la Mitjana Principal */
        .main-stat {
            background: var(--card);
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        .main-stat h2 { margin: 0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: #8d99ae; }
        .main-stat .value { font-size: 4rem; font-weight: 800; margin: 10px 0; color: var(--primary); transition: all 0.3s ease; }
        .main-stat .label { font-size: 1rem; color: #8d99ae; }

        /* Botonera */
        .nav-buttons {
            display: flex;
            background: #e2e8f0;
            padding: 5px;
            border-radius: 16px;
            margin-bottom: 25px;
        }

        .nav-buttons button {
            flex: 1;
            border: none;
            background: transparent;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            color: #64748b;
        }

        .nav-buttons button.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* Gràfica */
        .chart-box {
            background: var(--card);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        .footer { text-align: center; margin-top: 30px; color: #adb5bd; font-size: 0.8rem; padding-bottom: 40px; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; font-size: 1.8rem;">PiTemp Monitor</h1>
    <p style="margin:5px 0 0; opacity: 0.9;">Estadístiques en temps real</p>
</header>

<div class="container">
    <div class="main-stat">
        <h2 id="stat-title">Mitjana Mensual</h2>
        <div class="value" id="stat-value">--°C</div>
        <div class="label" id="stat-count">0 lectures analitzades</div>
    </div>

    <div class="nav-buttons">
        <button id="btn-dia" onclick="updateUI('diaria')">DIÀRIA</button>
        <button id="btn-set" onclick="updateUI('setmanal')">SETMANAL</button>
        <button id="btn-mes" class="active" onclick="updateUI('mensual')">MENSUAL</button>
    </div>

    <div class="chart-box">
        <canvas id="mainChart"></canvas>
    </div>

    <div class="footer">
        © 2026 Dissenyat per Mauri • Raspberry Pi SMX2
    </div>
</div>

<script>
    let rawData = [];
    let myChart;

    async function init() {
        const res = await fetch('dades_temperatura.csv');
        const csv = await res.text();
        const rows = csv.trim().split('\n').slice(1);
        
        let labels = [];
        let temps = [];

        rows.forEach(r => {
            const c = r.split(',');
            if(c.length >= 2) {
                const val = parseFloat(c[1]);
                rawData.push(val);
                labels.push(c[0].split(' ')[1].substring(0,5));
                temps.push(val);
            }
        });

        const ctx = document.getElementById('mainChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    data: temps,
                    borderColor: '#4361ee',
                    borderWidth: 3,
                    pointRadius: 0,
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(67, 97, 238, 0.1)'
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: { x: { display: false }, y: { grid: { color: '#f0f2f5' } } }
            }
        });

        updateUI('mensual');
    }

    function updateUI(mode) {
        let title = "";
        let filtered = [];
        
        // Treure classe activa de tots i posar-la al seleccionat
        document.querySelectorAll('.nav-buttons button').forEach(b => b.classList.remove('active'));

        if(mode === 'diaria') {
            title = "Mitjana Diària";
            filtered = rawData.slice(-24);
            document.getElementById('btn-dia').classList.add('active');
        } else if(mode === 'setmanal') {
            title = "Mitjana Setmanal";
            filtered = rawData.slice(-168); 
            document.getElementById('btn-set').classList.add('active');
        } else {
            title = "Mitjana Mensual";
            filtered = rawData;
            document.getElementById('btn-mes').classList.add('active');
        }

        const avg = filtered.length > 0 ? (filtered.reduce((a,b) => a+b) / filtered.length).toFixed(1) : "--";
        
        // Actualització amb efecte visual
        const valEl = document.getElementById('stat-value');
        valEl.style.opacity = 0;
        setTimeout(() => {
            document.getElementById('stat-title').innerText = title;
            valEl.innerText = avg + "°C";
            document.getElementById('stat-count').innerText = filtered.length + " lectures analitzades";
            valEl.style.opacity = 1;
        }, 200);
    }

    init();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiTemp App - Estadístiques</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #4361ee; --secondary: #3f37c9; --bg: #f8f9fa; --card-bg: #ffffff; }
        body { font-family: sans-serif; background-color: var(--bg); margin: 0; padding: 0; text-align: center; }
        header { background: var(--primary); color: white; padding: 20px; border-bottom-radius: 20px; }
        .app-container { max-width: 800px; margin: auto; padding: 20px; }
        
        /* Estil Botons */
        .button-group { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        button { 
            background: var(--primary); color: white; border: none; padding: 12px 20px; 
            border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        button:hover { background: var(--secondary); transform: translateY(-2px); }
        button:active { transform: scale(0.98); }

        /* Resultat Gran */
        .result-card { 
            background: white; padding: 30px; border-radius: 20px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 20px; 
        }
        .result-card h2 { margin: 0; color: #8d99ae; font-size: 0.9rem; text-transform: uppercase; }
        .result-card p { margin: 10px 0 0 0; font-size: 3rem; font-weight: 800; color: var(--primary); }

        .chart-container { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<header>
    <h1>🌡️ PiTemp Control</h1>
</header>

<div class="app-container">
    <div class="result-card">
        <h2 id="result-title">Mitjana Actual</h2>
        <p id="result-value">--°C</p>
    </div>

    <div class="button-group">
        <button onclick="calcularMitjana('diaria')">Mitjana Diària</button>
        <button onclick="calcularMitjana('setmanal')">Mitjana Setmanal</button>
        <button onclick="calcularMitjana('mensual')">Mitjana Mensual</button>
    </div>

    <div class="chart-container">
        <canvas id="appChart"></canvas>
    </div>
</div>

<script>
    let dadesGlobals = [];

    async function fetchData() {
        const response = await fetch('dades_temperatura.csv');
        const data = await response.text();
        const rows = data.trim().split('\n').slice(1);
        
        let labels = [], temps = [];
        rows.forEach(row => {
            const cols = row.split(',');
            if (cols.length >= 2) {
                const t = parseFloat(cols[1]);
                dadesGlobals.push(t);
                labels.push(cols[0].split(' ')[1].substring(0,5));
                temps.push(t);
            }
        });

        // Pintar gràfica inicial
        const ctx = document.getElementById('appChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{ label: 'Temp', data: temps, borderColor: '#4361ee', fill: true, tension: 0.4 }]
            },
            options: { plugins: { legend: { display: false } } }
        });
        
        // Per defecte mostrem la mensual
        calcularMitjana('mensual');
    }

    function calcularMitjana(tipus) {
        let titol = "";
        let valors = [];

        if (tipus === 'diaria') {
            titol = "Mitjana de les darreres 24h";
            valors = dadesGlobals.slice(-24); // Últimes 24 lectures
        } else if (tipus === 'setmanal') {
            titol = "Mitjana darrers 7 dies";
            valors = dadesGlobals.slice(-168); // Lectures d'una setmana (aprox)
        } else {
            titol = "Mitjana Mensual Total";
            valors = dadesGlobals;
        }

        const suma = valors.reduce((a, b) => a + b, 0);
        const mitjana = valors.length > 0 ? (suma / valors.length).toFixed(1) : "--";
        
        document.getElementById('result-title').innerText = titol;
        document.getElementById('result-value').innerText = mitjana + "°C";
    }

    fetchData();
</script>

</body>
</html>
